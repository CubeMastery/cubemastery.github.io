<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>CubeCTF 2026</title>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <meta name="description" content="All A/D, no AI. August 1, 10:00-18:00 EDT."/>
    <meta property="og:type" content="website"/>
    <meta property="og:title" content="CubeCTF 2026"/>
    <meta property="og:description" content="All A/D, no AI. August 1, 10:00-18:00 EDT."/>
    <meta property="og:image" content="https://avatars.githubusercontent.com/u/184881108?s=200&v=4"/>
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="CubeCTF 2026"/>
    <meta name="twitter:description" content="All A/D, no AI. August 1, 10:00-18:00 EDT."/>
    <meta name="twitter:image" content="https://avatars.githubusercontent.com/u/184881108?s=200&v=4"/>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/184881108?s=200&v=4"/>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 50px 28px;
            text-align: center;
            color: #e2e2e2;
            background-color: #1f1f1f;
            background-image: radial-gradient(circle, #0000003b 51%, #000);
            font-family: monospace;
        }

        h1, h2, h3 {
            margin: 0;
            font-weight: bold;
        }

        .top, .bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex: 0 0 auto;
        }

        .logo {
            flex: 1 1 auto;
            width: 100%;
            max-width: 480px;
            min-height: 0;
            background-image: url("https://cdn.prod.website-files.com/67c60bc4fdf338751e5d36ca/67c669136e1a691c406db2ec_CubeMasteryLogo.png");
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
        }

        .heading {
            white-space: nowrap;
            font-size: clamp(24px, 11.5vw, 80px);
            line-height: 1.08;
        }

        .subheading {
            white-space: nowrap;
            font-size: clamp(16px, 5.5vw, 30px);
            line-height: 1.2;
        }

        .countdown {
            font-size: clamp(24px, 10vw, 80px);
            line-height: 1.08;
        }

        .countdown span {
            display: inline-block;
        }

        .sponsorship {
            white-space: nowrap;
            font-size: clamp(11px, 3.6vw, 28px);
            line-height: 1.1;
        }

        .register {
            display: inline-block;
            padding: 1rem 2rem;
            color: #000;
            font-weight: bold;
            background: #0082f3;
            border-radius: 7px;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="top">
    <h1 class="heading">CubeCTF 2026</h1>
    <h2 class="subheading">All A/D, no AI</h2>
</div>
<div class="logo"></div>
<div class="bottom">
    <h3 class="countdown"><span>August&nbsp;1,</span> <span>10:00-18:00&nbsp;EDT</span></h3>
    <h3 class="sponsorship"><a href="https://discord.gg/cRMNjdR4Ug" class="register">Registration/Rules on discord</a>
    </h3>
</div>
</body>
</html>
